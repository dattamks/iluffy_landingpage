{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}i-Luffy | AI Resume Analyzer{% endblock %}</title>
  <meta name="description" content="AI-powered resume analysis to help you land more interviews." />

  <!-- Pre-built Tailwind CSS (no render-blocking JS) -->
  <link rel="stylesheet" href="{% static 'css/tailwind.built.css' %}" />

  <!-- Google Fonts for Logo -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Oswald:wght@700&family=Pirata+One&display=swap" rel="stylesheet" />

  <!-- Custom animations & styles (non-blocking) -->
  <link rel="preload" href="{% static 'css/style.css' %}" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="{% static 'css/style.css' %}" /></noscript>

  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-cream dark:bg-jet transition-colors font-sans">

  {% include "main/nav.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "main/footer.html" %}

  <!-- Back to top button -->
  <button id="back-to-top" class="fixed bottom-6 right-6 z-40 p-3 rounded-full bg-indigo-600 text-white shadow-lg shadow-indigo-500/25 hover:bg-indigo-500 transition-all back-to-top-enter hover:-translate-y-0.5 hidden" aria-label="Scroll to top">
    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
  </button>

  <script src="{% static 'js/main.js' %}" defer></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
