{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}i-Luffy | AI Resume Analyzer{% endblock %}</title>
  <meta name="description" content="AI-powered resume analysis to help you land more interviews." />

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            mist: { 50:'#f4f4f6', 100:'#ececf0', 200:'#d4d4da', 300:'#b0b0b8', 400:'#808088', 500:'#68686f', 600:'#505056' },
            cream:    '#faf9f7',
            graphite: '#212125',
            jet:      '#141416',
            charcoal: '#1a1a1e',
          },
          boxShadow: {
            lifted: '0 1px 2px rgba(0,0,0,0.04), 0 4px 16px -2px rgba(0,0,0,0.06), 0 12px 24px -4px rgba(0,0,0,0.04)',
          },
        },
      },
    }
  </script>

  <!-- Google Fonts for Logo -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Oswald:wght@700&family=Pirata+One&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{% static 'css/style.css' %}" />

  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-cream dark:bg-jet transition-colors font-sans">

  {% include "main/nav.html" %}

  {% block content %}{% endblock %}

  {% include "main/footer.html" %}

  <!-- Back to top button -->
  <button id="back-to-top" class="fixed bottom-6 right-6 z-40 p-3 rounded-full bg-indigo-600 text-white shadow-lg shadow-indigo-500/25 hover:bg-indigo-500 transition-all back-to-top-enter hover:-translate-y-0.5 hidden" aria-label="Scroll to top">
    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
  </button>

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
